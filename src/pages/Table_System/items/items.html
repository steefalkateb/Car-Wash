<ion-header>
    <ion-navbar color="gray" hideBackButton>
        <button class="navigation_hover" ion-button menuToggle>
      <ion-icon name="menu"></ion-icon>
    </button>

        <ion-buttons end>
            <button ion-button (click)="save(item)" style="color:  #f5f5f5;font-weight: bold;font-family: Arial" clear>Save</button>
        </ion-buttons>
    </ion-navbar>
</ion-header>


<ion-content fullscreen style="background-color: #eeeded;">
    <ion-grid>
        <ion-row wrap>
            <ion-col col-12 col-sm-12 col-md-12 col-lg-6 col-xl-6 class="col-50" style="border: 1px solid #b0b4b5; border-radius: 1%;height: 280px;background-color: #fbfbfb;">

                <div style="width: 100%;margin-top: 25px;">

                    <ion-item>
                        <ion-label>Item Name : </ion-label>
                        <ion-input type="text" [(ngModel)]="name"></ion-input>
                    </ion-item>

                    <ion-item>
                        <ion-label>Price : </ion-label>
                        <ion-input type="number" [(ngModel)]="price"></ion-input>
                    </ion-item>

                    <ion-item>
                        <ion-label>Cost : </ion-label>
                        <ion-input type="number" [(ngModel)]="cost"></ion-input>
                    </ion-item>

                    <ion-item>
                        <ion-label>Group Name : </ion-label>
                        <ion-select [(ngModel)]="groupname" class="ion-select" interface="action-sheet">
                            <ion-option *ngFor="let item of wash$ | async">{{item.name}}</ion-option>
                        </ion-select>
                    </ion-item>

                </div>

            </ion-col>



            <ion-col col-12 col-sm-12 col-md-12 col-lg-6 col-xl-6 class="col-50" style="background-color: #fbfbfb;">
                <div class="img_btn">
                    <img [src]="path_image" class="img">
                    <button full ion-button (click)="select_img()" style="display:block;text-transform: none;font-size: 15px;background-color: #227da0;height: 30px;">
                            Browse</button>
                </div>

            </ion-col>
        </ion-row>

    </ion-grid>


    <ngx-datatable class="fullscreen" [ngClass]="tablestyle" [rows]="item$ | async" [columnMode]="'flex'" [loadingIndicator]="loading" [sortType]="'multi'" [reorderable]="false" [rowHeight]="50" [headerHeight]="50" [summaryPosition]="'top'">
        <!-- https://devdactic.com/ionic-datatable-ngx-datatable/ -->
        <!-- https://github.com/swimlane/ngx-datatable/issues/630 -->
        <!-- https://stackoverflow.com/questions/48906898/set-fixed-height-for-ngx-datatable-in-angular-4 -->
        <ngx-datatable-column [flexGrow]="1">
            <ng-template ngx-datatable-header-template>
                <span style="margin-left: 10px">Name</span>
            </ng-template>
            <ng-template let-row="row" ngx-datatable-cell-template>
                <span style="margin-left: 10px"> {{row.name}} </span>
            </ng-template>
        </ngx-datatable-column>

        <ngx-datatable-column [flexGrow]="0.4">
            <ng-template ngx-datatable-header-template>
                <span>Price</span>
            </ng-template>
            <ng-template let-row="row" ngx-datatable-cell-template>
                <span> {{row.price}} </span>
            </ng-template>
        </ngx-datatable-column>

        <ngx-datatable-column [flexGrow]="0.4">
            <ng-template ngx-datatable-header-template>
                <span>Cost</span>
            </ng-template>
            <ng-template let-row="row" ngx-datatable-cell-template>
                <span> {{row.cost}} </span>
            </ng-template>
        </ngx-datatable-column>

        <ngx-datatable-column [flexGrow]="1">
            <ng-template ngx-datatable-header-template>
                <span>Group Name</span>
            </ng-template>
            <ng-template let-row="row" ngx-datatable-cell-template>
                <span> {{row.groupname}} </span>
            </ng-template>
        </ngx-datatable-column>

        <!-- <ngx-datatable-column name="Name" [flexGrow]="1"></ngx-datatable-column>
        <ngx-datatable-column name="Price" [flexGrow]="0.4"></ngx-datatable-column>
        <ngx-datatable-column name="Cost" [flexGrow]="0.4"></ngx-datatable-column>
        <ngx-datatable-column name="Groupname" [flexGrow]="1"></ngx-datatable-column> -->

        <ngx-datatable-column [resizeable]="false" [flexGrow]="0.4" [sortable]="false">
            <ng-template let-row="row" ngx-datatable-cell-template>
                <ion-buttons end>
                    <button no-margin ion-button full large style="color: #757575; background-color: transparent" (click)="edit(row)" class="btn_col">
                                        <ion-icon ios="ios-create" md="md-create"></ion-icon>
                                      </button>
                </ion-buttons>
            </ng-template>
        </ngx-datatable-column>

        <ngx-datatable-column [resizeable]="false" [flexGrow]="0.5" [sortable]="false">
            <ng-template ngx-datatable-header-template>
                <!-- <ion-buttons end> -->
                <ion-icon name="bulb" style="font-size: 30px" (click)="switchStyle()"></ion-icon>
                <!-- </ion-buttons> -->
            </ng-template>


            <ng-template let-row="row" ngx-datatable-cell-template>
                <button no-margin ion-button full large style="color: #757575;  background-color: transparent" (click)="delete_group(row)" class="btn_col">
                                    <ion-icon name="md-trash"></ion-icon>
                                  </button>
            </ng-template>
        </ngx-datatable-column>
    </ngx-datatable>
</ion-content>
