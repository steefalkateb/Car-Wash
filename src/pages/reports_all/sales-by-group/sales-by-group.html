<ion-header>

    <ion-navbar color="gray">
        <button class="navigation_hover" ion-button menuToggle>
      <ion-icon name="menu"></ion-icon>
    </button>
        <ion-buttons end>
            <button ion-button (click)="pdf()" style="color:  #f5f5f5;font-weight: bold;font-family: Arial" clear>Pdf</button>
        </ion-buttons>

        <ion-buttons end>
            <button ion-button (click)="print()" style="color:  #f5f5f5;font-weight: bold;font-family: Arial" clear>Print</button>
        </ion-buttons>

        <ion-buttons end>
            <button ion-button (click)="view()" style="color:  #f5f5f5;font-weight: bold;font-family: Arial" clear>View</button>
        </ion-buttons>



    </ion-navbar>

</ion-header>


<ion-content fullscreen style="background-color: #eeeded;">

    <br>
    <ion-grid>
        <ion-row wrap>
            <ion-col col-6 col-sm-6 col-md-6 col-lg-6 col-xl-6 class="col-50">
                <ion-item>
                    <ion-label>From</ion-label>
                    <ion-datetime displayFormat="DD/MM/YYYY" pickerFormat="DD MMM YYYY" [(ngModel)]="event1.startTime">
                    </ion-datetime>
                </ion-item>
            </ion-col>
            <ion-col col-6 col-sm-6 col-md-6 col-lg-6 col-xl-6 class="col-50">
                <ion-item>
                    <ion-label>To</ion-label>
                    <ion-datetime displayFormat="DD/MM/YYYY" pickerFormat="DD MMM YYYY" [(ngModel)]="event2.endTime">
                    </ion-datetime>
                </ion-item>
            </ion-col>
        </ion-row>
    </ion-grid>


    <ion-item>
        <ion-label>Group Name </ion-label>
        <ion-select interface="popover" [(ngModel)]="groupname" class="ion-select">
            <ion-option>Select All</ion-option>
            <ion-option *ngFor="let item of wash$ | async">{{item.name}}</ion-option>
        </ion-select>
    </ion-item>
    <br>

    <!-- <ngx-datatable class="fullscreen" [ngClass]="tablestyle" [rows]="sales_item$ | async" [columnMode]="'flex'" [loadingIndicator]="loading" [sortType]="'multi'" [reorderable]="false" [rowHeight]="50" [headerHeight]="50" [summaryPosition]="'top'"> -->
    <ngx-datatable class="fullscreen" [ngClass]="tablestyle" [rows]="sales_item$ | async" [columnMode]="'flex'" [scrollbarH]="true" [loadingIndicator]="loading" [sortType]="'multi'" [reorderable]="false" [rowHeight]="50" [headerHeight]="50" [summaryPosition]="'top'">

        <ngx-datatable-column [flexGrow]="0.4" [minWidth]="70">
            <ng-template ngx-datatable-header-template>
                <span style="margin-left: 10px">Code</span>
            </ng-template>
            <ng-template let-row="row" ngx-datatable-cell-template>
                <span style="margin-left: 10px"> {{row.code}} </span>
            </ng-template>
        </ngx-datatable-column>

        <ngx-datatable-column [flexGrow]="1" [minWidth]="150">
            <ng-template ngx-datatable-header-template>
                <span>Item Name</span>
            </ng-template>
            <ng-template let-row="row" ngx-datatable-cell-template>
                <span> {{row.itemname}} </span>
            </ng-template>
        </ngx-datatable-column>

        <ngx-datatable-column [flexGrow]="0.4" [minWidth]="50">
            <ng-template ngx-datatable-header-template>
                <span>Qty</span>
            </ng-template>
            <ng-template let-row="row" ngx-datatable-cell-template>
                <span> {{row.qty}} </span>
            </ng-template>
        </ngx-datatable-column>

        <ngx-datatable-column [flexGrow]="0.4" [minWidth]="50">
            <ng-template ngx-datatable-header-template>
                <span>Total</span>
            </ng-template>
            <ng-template let-row="row" ngx-datatable-cell-template>
                <span> {{row.total}} </span>
            </ng-template>
        </ngx-datatable-column>


        <ngx-datatable-column [flexGrow]="1" [minWidth]="150">
            <ng-template ngx-datatable-header-template>
                <span>Group Name</span>
            </ng-template>
            <ng-template let-row="row" ngx-datatable-cell-template>
                <span> {{row.groupname}} </span>
            </ng-template>
        </ngx-datatable-column>

        <!-- <ngx-datatable-column name="Code" [flexGrow]="0.4"></ngx-datatable-column>
        <ngx-datatable-column name="Itemname" [flexGrow]="1"></ngx-datatable-column>
        <ngx-datatable-column name="Qty" [flexGrow]="0.4"></ngx-datatable-column>
        <ngx-datatable-column name="Total" [flexGrow]="0.4"></ngx-datatable-column>
        <ngx-datatable-column name="Groupname" [flexGrow]="1"></ngx-datatable-column> -->
        <!-- https://devdactic.com/ionic-datatable-ngx-datatable/ -->
        <!-- https://github.com/swimlane/ngx-datatable/issues/630 -->
        <!-- https://stackoverflow.com/questions/48906898/set-fixed-height-for-ngx-datatable-in-angular-4 -->
        <ngx-datatable-column [resizeable]="false" [flexGrow]="0.5" [sortable]="false" [minWidth]="50">
            <ng-template ngx-datatable-header-template>
                <ion-icon name="bulb" style="font-size: 30px" (click)="switchStyle()"></ion-icon>
            </ng-template>
        </ngx-datatable-column>
    </ngx-datatable>


    <div style="height:50px;background-color: #464646;padding-top: 10px" [ngClass]="{'total_hidden': (total_page==false),'total_show': (total_page==true)}">



        <ngx-datatable [columnMode]="'flex'" [scrollbarH]="true" [loadingIndicator]="loading" [sortType]="'multi'" [reorderable]="false" [rowHeight]="50" [headerHeight]="50" [summaryPosition]="'top'">

            <ngx-datatable-column name="&nbsp; Rows : {{this.Count_Rows}}" [flexGrow]="0.4"></ngx-datatable-column>
            <ngx-datatable-column name="" [flexGrow]="1"></ngx-datatable-column>
            <ngx-datatable-column name="{{this.total_qty}}" [flexGrow]="0.4"></ngx-datatable-column>
            <ngx-datatable-column name="" [flexGrow]="0.4"></ngx-datatable-column>
            <ngx-datatable-column name="{{this.total}}" [flexGrow]="1"></ngx-datatable-column>

            <ngx-datatable-column name="" [flexGrow]="0.5"></ngx-datatable-column>



        </ngx-datatable>

    </div>
</ion-content>
