<ion-header>
    <ion-navbar class="navigation_hover" color="gray">

        <ion-buttons end>
            <button ion-button (click)="ok()" style="fill:  #f5f5f5;font-family: 'ERASMD' !important;">
                    <div class="button_hover:hover">
                        <!-- <svg  style="fill:  #f5f5f5;font-family: 'ERASMD' !important;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" hideWhen="ios">
                        <path  fill="none" d="M0 0h24v24H0V0z"/>
                        <path   d="M19 13v5c0 .55-.45 1-1 1H6c-.55 0-1-.45-1-1v-5c0-.55-.45-1-1-1s-1 .45-1 1v6c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-6c0-.55-.45-1-1-1s-1 .45-1 1zm-6-.33l1.88-1.88c.39-.39 1.02-.39 1.41 0 .39.39.39 1.02 0 1.41l-3.59 3.59c-.39.39-1.02.39-1.41 0L7.7 12.2c-.39-.39-.39-1.02 0-1.41.39-.39 1.02-.39 1.41 0L11 12.67V4c0-.55.45-1 1-1s1 .45 1 1v8.67z"/>
                        </svg> -->
    
                        <ion-icon  md="md-checkbox-outline"></ion-icon>
    
                        <br>
                        <label style="color: #f5f5f5">OK</label>
                    </div>
                </button>
        </ion-buttons>

        <ion-buttons end>
            <button ion-button style="color:  #757575; top:-3px" (click)="closeModal()">
             <h1>|</h1>
          </button>
        </ion-buttons>

        <ion-buttons end>
            <button ion-button (click)="closeModal()" style="fill:  #f5f5f5;font-family: 'ERASMD' !important;">
            <div>
                <svg style="fill:  #f5f5f5;font-family: 'ERASMD' !important;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" hideWhen="ios">
                  <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                  <path d="M0 0h24v24H0z" fill="none"/></svg>
              <br>
              <label style="color: #f5f5f5">close</label>
            </div>
          </button>
        </ion-buttons>


        <ion-buttons end>
            <button ion-button style="fill:  #757575">
            <div>
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" hideWhen="ios">
                <path
                  d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                <path d="M0 0h24v24H0z" fill="none" /></svg>
              <br>
              <label style="color: #757575">Clear</label>
            </div>
          </button>
        </ion-buttons>
    </ion-navbar>
</ion-header>


<ion-content padding style="background-color: #eeeded;">
    <ion-item>
        <ion-label>Name : {{buy.name}} </ion-label>
    </ion-item>
    <ion-item>
        <ion-label>Price : {{buy.price}} </ion-label>
    </ion-item>

    <br><br>

    <ion-grid text-center>
        <ion-row justify-content-center>

            <ion-col col-sm-1 col-xl-1 col-md-1 col-lg-1>
                <div>
                    <ion-buttons start>
                        <button ion-button icon-only (click)="minus()">
              <ion-icon name="remove-circle"></ion-icon>
            </button>
                    </ion-buttons>
                </div>
            </ion-col>

            <ion-col col-sm-2 col-xl-2 col-md-2 col-lg-2>
                <div>
                    <ion-item>
                        <ion-label style="font-size: 20px" text-center> {{qty_buy}} </ion-label>
                    </ion-item>
                </div>
            </ion-col>

            <ion-col col-sm-1 col-xl-1 col-md-1 col-lg-1>
                <div>
                    <ion-buttons end>
                        <button ion-button icon-only (click)="plus()">
              <ion-icon name="add-circle"></ion-icon>
            </button>
                    </ion-buttons>
                </div>
            </ion-col>

        </ion-row>
    </ion-grid>

    <ion-item>
        <ion-label> Total : {{total_buy}} </ion-label>
    </ion-item>


</ion-content>
