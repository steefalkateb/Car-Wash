<ion-content fullscreen class="myview">
    <div id="box" style="text-align: center">
        <div>
            <img src="../../assets/imgs/png_wash.png" style="width: 180px; display: block;
            margin-left: auto;
            margin-right: auto;" />
        </div>

        <div class="name_wash">MASSAR</div>
        <div class="name_car">Car Wash</div>

        <ion-input id="input" disabled="disabled" text-center type="password" [(ngModel)]="password"></ion-input>

        <div style="background-color: rgba(0, 0, 0, 0.308);
                border-radius: 8%;">

            <ion-grid text-center>
                <ion-row>
                    <ion-col col-sm-4 col-xl-4 col-md-4 col-lg-4>

                        <button ion-button round (click)="number('1')" class="numberCircle">1</button>
                    </ion-col>
                    <ion-col col-sm-4 col-xl-4 col-md-4 col-lg-4>
                        <button ion-button round (click)="number('2')" class="numberCircle">2</button>
                    </ion-col>
                    <ion-col col-sm-4 col-xl-4 col-md-4 col-lg-4>
                        <button ion-button round (click)="number('3')" class="numberCircle">3</button>
                    </ion-col>
                </ion-row>
                <ion-row>

                    <ion-col col-sm-4 col-xl-4 col-md-4 col-lg-4>
                        <button ion-button round (click)="number('4')" class="numberCircle">4</button>
                    </ion-col>
                    <ion-col col-sm-4 col-xl-4 col-md-4 col-lg-4>
                        <button ion-button round (click)="number('5')" class="numberCircle">5</button>
                    </ion-col>
                    <ion-col col-sm-4 col-xl-4 col-md-4 col-lg-4>
                        <button ion-button round (click)="number('6')" class="numberCircle">6</button>
                    </ion-col>
                </ion-row>

                <ion-row>

                    <ion-col col-sm-4 col-xl-4 col-md-4 col-lg-4>
                        <button ion-button round (click)="number('7')" class="numberCircle">7</button>
                    </ion-col>
                    <ion-col col-sm-4 col-xl-4 col-md-4 col-lg-4>
                        <button ion-button round (click)="number('8')" class="numberCircle">8</button>
                    </ion-col>
                    <ion-col col-sm-4 col-xl-4 col-md-4 col-lg-4>
                        <button ion-button round (click)="number('9')" class="numberCircle">9</button>
                    </ion-col>
                </ion-row>

                <ion-row>
                    <ion-col col-sm-4 col-xl-4 col-md-4 col-lg-4>
                        <button ion-button round (click)="clear()" class="numberCircle" style="font-size: 20px">
                                    <ion-icon name="arrow-back"></ion-icon>
                                </button>
                    </ion-col>
                    <ion-col col-sm-4 col-xl-4 col-md-4 col-lg-4>
                        <button ion-button round (click)="number('0')" class="numberCircle">0</button>
                    </ion-col>
                    <ion-col col-sm-4 col-xl-4 col-md-4 col-lg-4>
                        <button ion-button round (click)="ok(user)" class="numberCircle" style="font-size: 20px">Ok</button>
                    </ion-col>
                </ion-row>
            </ion-grid>
        </div>
    </div>



</ion-content>
